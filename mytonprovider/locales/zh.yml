"modules":
  "mytonprovider":
    "cmd":
      "info": "实用信息"
    "status":
      "cpu_load":      "CPU 负载 [{cores}]"
      "memory_load":   "内存负载"
      "disk_space":    "应用磁盘"
      "disk_io":       "磁盘 I/O"
      "network_io":    "网络 I/O"
      "network_total": "网络总计"
    "info": |

      首次启动
        1. 确保所有模块已激活、端口已开放 — status
        2. 导入钱包，可选 — wallet import
        3. 将私钥保存在安全的地方 — wallet export
        4. 充值钱包余额并在公开列表注册提供者 — register

        注册交易确认后，提供者将出现在 mytonprovider.org 的公开列表中

      提供者监控
        1. 启用 telemetry — telemetry enable
        2. 设置机器人授权密码 — telemetry password
        3. 打开 @mytonprovider_bot 找到您的提供者
        4. 输入之前设置的密码以订阅

      举报问题 bag
        1. 打开 @bagidreport_bot
        2. 发送您想要举报的 bag id
        3. 提供描述和举报理由
        4. 管理员将审核举报，并屏蔽确认有问题的 bag

      文件系统
        /usr/src/                源代码：mytonprovider, tonutils-storage, tonutils-storage-provider
        /usr/local/bin/          已安装的二进制文件：mytonprovider, tonutils, tonutils-storage, tonutils-storage-provider
        /var/lib/mytonprovider/  应用状态：数据库、日志、Python venv
        /var/storage/            提供者数据：ton-storage 和 provider 配置、bags

      服务
        mytonproviderd.service           管理器 daemon
        mytonprovider-updater.service    自动更新 daemon
        ton-storage.service              tonutils-storage daemon
        ton-storage-provider.service     tonutils-storage-provider daemon

      日志
        应用日志文件: /var/lib/mytonprovider/mytonprovider.log
        通过 systemd journal 查看服务日志:
          journalctl -u mytonproviderd -n 100 -f
          journalctl -u mytonprovider-updater -n 100 -f
          journalctl -u ton-storage -n 100 -f
          journalctl -u ton-storage-provider -n 100 -f

      提示
        切换语言:  db set language <ru|en|zh>
        Debug 模式: db set debug <true|false>

      社区: @mytonprovider_chat — 问题与讨论
