"mypycli":
  "welcome": |

    Добро пожаловать в {label}!
    Наберите {help} для списка команд.

    Первый запуск:
      1. Убедитесь, что все модули активны и порты открыты (status)
      2. Импортируйте кошелёк, опционально (wallet import)
      3. Сохраните приватный ключ в надёжном месте (wallet export)
      4. Пополните баланс и зарегистрируйте провайдера в публичном списке (register)

    Мониторинг провайдера:
      1. Убедитесь, что модуль telemetry включён (telemetry enable)
      2. Задайте пароль для авторизации в боте (telemetry password)
      3. Откройте @mytonprovider_bot и найдите своего провайдера
      4. Подпишитесь, введя заданный ранее пароль

    Сменить язык    db set language <ru|en|zh>
    Debug-режим     db set debug    <true|false>

    Сообщество: @mytonprovider_chat — вопросы и обсуждение
