"mypycli":
  "welcome": |

    Welcome to {label}!
    Type {help} for available commands.

    First run:
      1. Make sure all modules are active and ports are open (status)
      2. Import a wallet, optional (wallet import)
      3. Save the private key in a safe place (wallet export)
      4. Top up the balance and register the provider in the public list (register)

    Provider monitoring:
      1. Ensure the telemetry module is enabled (telemetry enable)
      2. Set the password for bot authorization (telemetry password)
      3. Open @mytonprovider_bot and find your provider
      4. Subscribe by entering the previously set password

    Change language  db set language <ru|en|zh>
    Debug mode       db set debug    <true|false>

    Community: @mytonprovider_chat — questions and discussion
